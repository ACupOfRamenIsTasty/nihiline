<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <meta property="og:title" content="Rhythm" />
  <meta property="og:description"
    content="A vertical scrolling rhythm game where you have to hit the notes falling down, which will appear according to the music." />
  <meta property="og:url" content="https://acupoframen.github.io/nihiline/" />
  <meta property="og:image" content="/logo.png" />
  <link rel="shortcut icon" type="image/png" href="/logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="src/app.css" />
  <title>nihiline</title>
</head>

<body>
  <audio class="chart" src="/music.mp3"></audio>

  <!-- Progress timer: fixed to the very top, grows left to right -->
  <div class="summary__timer" role="progressbar" aria-label="Chart progress">
    <div class="summary__timer-bar"></div>
  </div>

  <!-- Real-time score and accuracy: top-right corner -->
  <div class="hud" aria-label="Live score and accuracy">
    <div class="hud__score" aria-label="Score">0000000</div>
    <div class="hud__accuracy" aria-label="Accuracy">100.00%</div>
  </div>

  <main>
    <!-- Play field: four centered lanes -->
    <section class="game" aria-label="Note lanes">
      <div class="hit">
        <div class="hit__reminder" aria-hidden="true"></div>
        <div class="hit__combo"></div>
        <div class="hit__accuracy"></div>
      </div>

      <div class="track-container"></div>

      <div class="key-container">
        <div class="key key--d key--white">
          <div class="keypress keypress--white"></div>
          <div class="keypress keypress--red"></div>
          <div>
            <span style="font-size: 24px; color: #FF00FF">E</span>
          </div>
          <div>
            <span style="font-size: 24px; color: white">D</span>
          </div>
        </div>
        <div class="key key--f key--white">
          <div class="keypress keypress--white"></div>
          <div class="keypress keypress--red"></div>
          <div>
            <span style="font-size: 24px; color: #FF00FF">R</span>
          </div>
          <div>
            <span style="font-size: 24px; color: white">F</span>
          </div>
        </div>
        <div class="key key--j key--white">
          <div class="keypress keypress--white"></div>
          <div class="keypress keypress--red"></div>
          <div>
            <span style="font-size: 24px; color: #FF00FF">U</span>
          </div>
          <div>
            <span style="font-size: 24px; color: white">J</span>
          </div>
        </div>
        <div class="key key--k key--white">
          <div class="keypress keypress--white"></div>
          <div class="keypress keypress--red"></div>
          <div>
            <span style="font-size: 24px; color: #FF00FF">I</span>
          </div>
          <div>
            <span style="font-size: 24px; color: white">K</span>
          </div>
        </div>

        <!-- Wide centered blue lane (SPACE): overlaps the middle two columns -->
        <div class="key--blue">
          <div class="keypress keypress--blue"></div>
          <div class="key--blue-label">SPACE</div>
        </div>
      </div>
    </section>

    <!-- Start overlay: centered interactive tutorial -->
    <div class="menu">
      <div class="menu__tutorial">
        <!-- Step 1: white lane keys -->
        <div class="tutorial__step tutorial__step--white is-active" data-step="0">
          <p class="tutorial__hint">Simultaneously hold</p>
          <div class="tutorial__keys">
            <span class="tutorial__key" data-key="d">D</span>
            <span class="tutorial__key" data-key="f">F</span>
            <span class="tutorial__key" data-key="j">J</span>
            <span class="tutorial__key" data-key="k">K</span>
          </div>
        </div>

        <!-- Step 2: red lane keys -->
        <div class="tutorial__step tutorial__step--magenta" data-step="1">
          <p class="tutorial__hint">Now hold</p>
          <div class="tutorial__keys">
            <span class="tutorial__key" data-key="e">E</span>
            <span class="tutorial__key" data-key="r">R</span>
            <span class="tutorial__key" data-key="u">U</span>
            <span class="tutorial__key" data-key="i">I</span>
          </div>
        </div>

        <!-- Step 3: blue lane key / start -->
        <div class="tutorial__step tutorial__step--cyan" data-step="2">
          <p class="tutorial__hint">Press to start</p>
          <div class="tutorial__keys">
            <span class="tutorial__key tutorial__key--space" data-key=" ">SPACE</span>
          </div>
        </div>
      </div>

      <!-- Retained for game logic; triggered programmatically by the tutorial -->
      <div class="menu__start">
        <button class="btn btn--primary btn--start" type="button">Start</button>
      </div>
    </div>

    <!-- Results overlay: centered. Contents rendered by src/results.js -->
    <div class="summary">
      <div class="summary__result" role="status" aria-live="polite"></div>
    </div>
  </main>

  <script type="module" src="src/chart.js"></script>
  <script type="module" src="src/app.js"></script>
</body>

</html>
